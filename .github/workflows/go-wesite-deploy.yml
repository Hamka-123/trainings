name: Build & Push to GHCR

on:
    push:
        branches: ["main"]
    workflow_dispatch: # Возможность ручного запуска

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # Запрашиваем права на запись в GHCR

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  #images: ghcr.io/${{ github.repository }}
                  images: ghcr.io/${{ github.repository_owner }}/go-web-app
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: ./go-web-site # <--- Указываем папку с Dockerfile
                  file: ./go-web-site/Dockerfile # <--- Явный путь к Dockerfile
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha # Используем встроенное кэширование GitHub Actions
                  cache-to: type=gha,mode=max

name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select action (apply / destroy)"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: "Environment / Workspace"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Автоматически передаем логин и токен для провайдера docker в Terraform
  TF_VAR_ghcr_username: ${{ github.actor }}
  TF_VAR_ghcr_token: ${{ secrets.GHCR_PAT }}
  # Передаем образ по умолчанию
  TF_VAR_container_image: "ghcr.io/hamka-123/go-web-app:latest"

jobs:
  terraform:
    name: terraform ${{ inputs.action }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./go-web-site/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Select or Create Workspace
        run: |
          terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }}

      - name: Terraform Plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform ${{ inputs.action }}
        run: |
          terraform apply -auto-approve tfplan
